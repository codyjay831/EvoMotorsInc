# Validate Next.js build (used by CI). Actual deploy is via Firebase App Hosting ↔ GitHub.
name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Optional: set for build-time if needed (App Hosting sets these in Console)
          NEXT_PUBLIC_SITE_URL: https://evomotorsinc.com
