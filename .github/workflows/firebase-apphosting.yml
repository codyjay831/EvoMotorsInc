# Validate Next.js build (used by CI). Actual deploy is via Firebase App Hosting ↔ GitHub.
name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Production build requires live HTTPS origins (see lib/api/config.ts, lib/auth-bridge.ts).
          # Override in Firebase Console → App Hosting → Environment if your Vehiclix URLs differ.
          NEXT_PUBLIC_SITE_URL: https://evomotorsinc.com
          NEXT_PUBLIC_VEHICLIX_API_URL: https://api.vehiclix.com
          NEXT_PUBLIC_DEALER_SLUG: evo-motors
          NEXT_PUBLIC_VEHICLIX_APP_URL: https://app.evomotorsinc.com
