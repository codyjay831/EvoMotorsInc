# Firebase App Hosting — Evo Motors Next.js app
# See: https://firebase.google.com/docs/app-hosting/configure
#
# Build/run: App Hosting auto-detects Next.js (next build / next start).
# Env: Set in Firebase Console (Backend → Settings → Environment) or here.
# Secrets: Use Firebase Console or Cloud Secret Manager; reference in env with secret: name.

# Optional: override Cloud Run defaults (defaults are fine for most apps)
# runConfig:
#   minInstances: 0
#   maxInstances: 100
#   memoryMiB: 512
#   cpu: 1

# Non-secret defaults for App Hosting builds. Console → Environment overrides these.
# Use NEXT_PUBLIC_* for client-side in Next.js (injected at build time).
env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://evomotorsinc.com
  - variable: NEXT_PUBLIC_VEHICLIX_API_URL
    value: https://api.vehiclix.app
  - variable: NEXT_PUBLIC_DEALER_SLUG
    value: evo-motors
  - variable: NEXT_PUBLIC_VEHICLIX_APP_URL
    value: https://app.evomotorsinc.com
  - variable: NEXT_PUBLIC_VEHICLIX_LOGIN_URL
    value: https://app.evomotorsinc.com/login
  - variable: NEXT_PUBLIC_VEHICLIX_REGISTER_URL
    value: https://app.evomotorsinc.com/register
  - variable: NEXT_PUBLIC_VEHICLIX_PORTAL_URL
    value: https://app.evomotorsinc.com/portal
